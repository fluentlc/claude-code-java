# ─── Spring Boot ─────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=claude-code-4j

# ─── 客户端选择 ───────────────────────────────────────────────────────────────
# CLIENT_TYPE=openai     → 使用 OpenAI Chat Completions 协议（默认）
# CLIENT_TYPE=anthropic  → 使用 Anthropic Messages API
CLIENT_TYPE=openai

# ─── OpenAI 协议配置 ──────────────────────────────────────────────────────────
# 支持 OpenAI / Azure OpenAI / Ollama / DashScope / 任何兼容服务
# 所有配置项支持环境变量覆盖（优先级：环境变量 > 此文件 > 默认值）
OPENAI_BASE_URL=https://1688openai.alibaba-inc.com
OPENAI_API_KEY=d04b3a0ff3ec47ddb346a80a64f6f440
OPENAI_MODEL_ID=qwen3.5-plus
OPENAI_X_PLATFORM=dashscope

# 可选：平台标识 Header（DashScope 等平台需要）
# OPENAI_X_PLATFORM=dashscope

# ─── Anthropic 协议配置（CLIENT_TYPE=anthropic 时生效）──────────────────────
# ANTHROPIC_API_KEY=your_api_key_here
# ANTHROPIC_BASE_URL=https://api.anthropic.com
# MODEL_ID=claude-sonnet-4-20250514

# ─── 调试 ─────────────────────────────────────────────────────────────────────
# 设为 true 打印完整 API 请求/响应报文（排查问题用）
# DEBUG_PRINT_PAYLOAD=false

#---
# CLI 模式：禁用 Web Server（spring.profiles.active=cli 时生效）
spring.config.activate.on-profile=cli
spring.main.web-application-type=none
